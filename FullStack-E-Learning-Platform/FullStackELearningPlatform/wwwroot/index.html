<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Learning Platform</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<main class="auth-page">
    <div class="auth-card">
        <h1>Welcome to E-Learning</h1>
        <p>Login or register to start your learning journey.</p>

        <div class="auth-toggle">
            <button id="loginTab" class="active">Login</button>
            <button id="registerTab">Register</button>
        </div>

        <div id="loginForm" class="auth-form">
            <input id="emailLogin" type="email" placeholder="Email">
            <input id="passwordLogin" type="password" placeholder="Password">
            <button id="loginButton">Login</button>
            <p id="loginError" class="form-error"></p>
        </div>

        <div id="registerForm" class="auth-form hidden">
            <input id="fullNameRegister" placeholder="Full Name">
            <input id="emailRegister" type="email" placeholder="Email">
            <input id="passwordRegister" type="password" placeholder="Password">
            <button id="registerButton">Register</button>
            <p id="registerError" class="form-error"></p>
        </div>

        <p class="small-text">No admin panel. Just student login, courses, quizzes and profile.</p>
    </div>
</main>

<script src="js/api.js"></script>
<script>
const loginTab = document.getElementById('loginTab');
const registerTab = document.getElementById('registerTab');
const loginForm = document.getElementById('loginForm');
const registerForm = document.getElementById('registerForm');

loginTab.addEventListener('click', () => {
    loginTab.classList.add('active');
    registerTab.classList.remove('active');
    loginForm.classList.remove('hidden');
    registerForm.classList.add('hidden');
});

registerTab.addEventListener('click', () => {
    registerTab.classList.add('active');
    loginTab.classList.remove('active');
    registerForm.classList.remove('hidden');
    loginForm.classList.add('hidden');
});

async function login() {
    const email = document.getElementById('emailLogin').value.trim();
    const password = document.getElementById('passwordLogin').value.trim();
    const error = document.getElementById('loginError');
    error.innerText = '';

    if (!email || !password) {
        error.innerText = 'Please enter both email and password.';
        return;
    }

    try {
        const res = await fetch('http://localhost:5229/api/users/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        if (!res.ok) {
            const body = await res.json().catch(() => null);
            error.innerText = body?.message || 'Login failed. Check your credentials.';
            return;
        }

        const user = await res.json();
        localStorage.setItem('userId', user.userId);
        localStorage.setItem('userName', user.fullName);
        localStorage.setItem('userEmail', user.email);
        window.location.href = 'Dashboard.html';
    } catch (err) {
        error.innerText = 'Server error. Please try again.';
        console.error(err);
    }
}

async function registerUser() {
    const fullName = document.getElementById('fullNameRegister').value.trim();
    const email = document.getElementById('emailRegister').value.trim();
    const password = document.getElementById('passwordRegister').value.trim();
    const error = document.getElementById('registerError');
    error.innerText = '';

    if (!fullName || !email || !password) {
        error.innerText = 'All fields are required.';
        return;
    }

    try {
        const res = await fetch('http://localhost:5229/api/users/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fullName, email, password })
        });

        if (!res.ok) {
            const body = await res.json().catch(() => null);
            error.innerText = body?.message || 'Registration failed.';
            return;
        }

        const user = await res.json();
        localStorage.setItem('userId', user.userId);
        localStorage.setItem('userName', user.fullName);
        localStorage.setItem('userEmail', user.email);
        window.location.href = 'Dashboard.html';
    } catch (err) {
        error.innerText = 'Server error. Please try again.';
        console.error(err);
    }
}

document.getElementById('loginButton').addEventListener('click', login);
document.getElementById('registerButton').addEventListener('click', registerUser);
</script>

</body>
</html>
